name = "tmux"
version = "0.2.0"
description = "Manages tmux sessions for workspaces"
hooks = ["on_session_create", "on_session_delete", "on_session_enter", "on_session_exit", "on_bind", "on_view", "on_view_select"]
executable = "tmux-plugin"

# In the session picker: alt-a creates/attaches to the tmux session for the selected session
[[binds]]
key = "alt-a"
name = "tmux_attach"
label = "tmux"
description = "Attach to tmux session"
contexts = ["session"]

# In other views: ctrl-a shows a list of all ez-managed tmux sessions
[[views]]
name = "tmux"
key = "ctrl-a"
label = "tmux"
contexts = ["repo", "owner", "workspace", "tree", "label"]

[[config_schema]]
name = "auto_attach"
type = "bool"
default = false
description = "Automatically attach/switch to tmux session when entering a session"

[[config_schema]]
name = "return_on_detach"
type = "bool"
default = true
description = "Re-enter ez browser after detaching from a tmux session"

[[config_schema]]
name = "reap_delay_ms"
type = "int"
default = 200
description = "Milliseconds to wait before running delete hooks in the reap worker"
