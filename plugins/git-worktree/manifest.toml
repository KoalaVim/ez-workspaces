name = "git-worktree"
version = "0.1.0"
description = "Manages git worktrees for sessions"
hooks = ["on_session_create", "on_session_delete"]
executable = "git-worktree-plugin"
mutates_session_path = true

[[config_schema]]
name = "fetch_ttl"
type = "int"
default = 60
description = "Seconds to cache `git fetch` before refetching on session create. Set to 0 to always fetch."
